<!DOCTYPE html>
<html>
<head>
    <title>Tip Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 300px; margin: auto; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Tip Calculator</h2>
        <label>Bill Amount ($)</label>
        <input type="number" id="bill" placeholder="100">
        
        <label>Tip %</label>
        <input type="number" id="tip" placeholder="15">
        
        <label>Number of People</label>
        <input type="number" id="people" placeholder="1">
        
        <button onclick="calculateTip()">Calculate</button>
        
        <div class="result" id="results"></div>
    </div>

    <script>
        function calculateTip() {
            let bill = parseFloat(document.getElementById('bill').value);
            let tipPercent = parseFloat(document.getElementById('tip').value);
            let people = parseFloat(document.getElementById('people').value);

            let tipAmount = (bill * (tipPercent / 100)) / people;
            let totalPerPerson = (bill + (bill * (tipPercent / 100))) / people;

            document.getElementById('results').innerHTML = 
                `Tip per person: $${tipAmount.toFixed(2)}<br>
                 Total per person: $${totalPerPerson.toFixed(2)}`;
        }
    </script>
</body>
</html>
