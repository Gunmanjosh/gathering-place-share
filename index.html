<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gathering Place</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin: 0 0 20px 0;
        }
        .share-button {
            background-color: #667eea;
            color: white;
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 20px;
        }
        .share-button:hover {
            background-color: #764ba2;
        }
        .share-button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .status-message {
            margin: 20px 0;
            font-size: 14px;
            color: #666;
            min-height: 20px;
        }
        .social-links {
            display: none;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .social-links.show {
            display: flex;
        }
        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            text-decoration: none;
            font-size: 24px;
            transition: transform 0.2s, opacity 0.2s;
            border: none;
            cursor: pointer;
        }
        .social-btn:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }
        .facebook {
            background-color: #1877f2;
            color: white;
        }
        .twitter {
            background-color: #1da1f2;
            color: white;
        }
        .whatsapp {
            background-color: #25d366;
            color: white;
        }
        .email {
            background-color: #ea4335;
            color: white;
        }
        .copy-link {
            background-color: #34a853;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Gathering Place</h1>
        <button class="share-button" id="shareBtn">Share with Friends</button>
        <div class="status-message" id="statusMsg"></div>
        
        <div class="social-links" id="socialLinks">
            <a href="#" class="social-btn facebook" id="fbBtn" title="Share on Facebook">f</a>
            <a href="#" class="social-btn twitter" id="twitterBtn" title="Share on Twitter">𝕏</a>
            <a href="#" class="social-btn whatsapp" id="whatsappBtn" title="Share on WhatsApp">💬</a>
            <a href="#" class="social-btn email" id="emailBtn" title="Share via Email">✉</a>
            <button class="social-btn copy-link" id="copyBtn" title="Copy Link">📋</button>
        </div>
    </div>

    <script>
        const shareData = {
            title: 'The Gathering Place',
            text: 'Check out The Gathering Place!',
            url: 'https://thegatheringplace.us'
        };

        const shareBtn = document.getElementById('shareBtn');
        const statusMsg = document.getElementById('statusMsg');
        const socialLinks = document.getElementById('socialLinks');
        const fbBtn = document.getElementById('fbBtn');
        const twitterBtn = document.getElementById('twitterBtn');
        const whatsappBtn = document.getElementById('whatsappBtn');
        const emailBtn = document.getElementById('emailBtn');
        const copyBtn = document.getElementById('copyBtn');

        // Detect if device is mobile
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // Main share function
        async function handleShare() {
            try {
                // If mobile and Web Share API available, use native share
                if (isMobileDevice() && navigator.share) {
                    await navigator.share(shareData);
                    statusMsg.textContent = '✓ Thanks for sharing!';
                    statusMsg.style.color = 'green';
                    socialLinks.classList.remove('show');
                } else {
                    // For desktop or if Web Share API not available, show social options
                    toggleSocialLinks();
                }
            } catch (error) {
                if (error.name !== 'AbortError') {
                    statusMsg.textContent = '✗ Share error: ' + error.message;
                    statusMsg.style.color = 'red';
                    console.error('Share error:', error);
                }
            }
        }

        // Toggle social share links visibility
        function toggleSocialLinks() {
            socialLinks.classList.toggle('show');
            if (socialLinks.classList.contains('show')) {
                statusMsg.textContent = 'Choose a platform to share:';
                statusMsg.style.color = '#333';
            } else {
                statusMsg.textContent = '';
            }
        }

        // Facebook share
        fbBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareData.url)}`;
            window.open(url, 'facebook-share', 'width=600,height=400');
            statusMsg.textContent = '✓ Opening Facebook...';
            statusMsg.style.color = 'green';
        });

        // Twitter share
        twitterBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareData.text)}&url=${encodeURIComponent(shareData.url)}`;
            window.open(url, 'twitter-share', 'width=600,height=400');
            statusMsg.textContent = '✓ Opening Twitter...';
            statusMsg.style.color = 'green';
        });

        // WhatsApp share
        whatsappBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const url = `https://wa.me/?text=${encodeURIComponent(shareData.text + ' ' + shareData.url)}`;
            window.open(url, 'whatsapp-share', 'width=600,height=400');
            statusMsg.textContent = '✓ Opening WhatsApp...';
            statusMsg.style.color = 'green';
        });

        // Email share
        emailBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const mailtoLink = `mailto:?subject=${encodeURIComponent(shareData.title)}&body=${encodeURIComponent(shareData.text + '\n\n' + shareData.url)}`;
            window.location.href = mailtoLink;
            statusMsg.textContent = '✓ Opening email client...';
            statusMsg.style.color = 'green';
        });

        // Copy link to clipboard
        copyBtn.addEventListener('click', async function() {
            try {
                await navigator.clipboard.writeText(shareData.url);
                statusMsg.textContent = '✓ Link copied to clipboard!';
                statusMsg.style.color = 'green';
            } catch (err) {
                statusMsg.textContent = '✗ Failed to copy link';
                statusMsg.style.color = 'red';
            }
        });

        // Attach click event to main button
        shareBtn.addEventListener('click', handleShare);

        // Close social links when clicking outside
        document.addEventListener('click', function(e) {
            if (e.target !== shareBtn && !socialLinks.contains(e.target)) {
                socialLinks.classList.remove('show');
                statusMsg.textContent = '';
            }
        });
    </script>
</body>
</html>
