<a href="#" id="shareLink" style="display:inline-block; width:40px; height:40px;">
</a>
<script>
document.getElementById('shareLink').addEventListener('click', function(event) {
  event.preventDefault(); // Prevent default link behavior
  if (navigator.share) {
    navigator.share({
      title: 'The Gathering Place',
      text: 'Check out The Gathering Place!',
      url: 'https://thegatheringplace.us'
    }).then(() => {
      console.log('Thanks for sharing!');
    }).catch((error) => {
      console.error('Error sharing:', error);
    });
  } else {
    alert('Sharing not supported on this browser.');
  }
});
</script>
